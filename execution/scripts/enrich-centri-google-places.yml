name: Enrich Centri Commerciali with Google Places API

# Cron MENSILE — il 2 di ogni mese alle 05:00 UTC (dopo l'enrichment hotel del 1°,
# per non sovrapporre le chiamate Google nello stesso giorno).
on:
  schedule:
    - cron: "0 5 2 * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo simulazione (non scrive nel Sheet)"
        required: false
        default: "false"
      max_calls:
        description: "Max chiamate Google Places in questo run (default 5000)"
        required: false
        default: "5000"
      city:
        description: "Limita a una sola città (opzionale, es: Torino)"
        required: false
        default: ""

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run enrich_google_places_centri
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          CENTRI_APPS_SCRIPT_URL: ${{ secrets.CENTRI_APPS_SCRIPT_URL }}
          CENTRI_APPS_SCRIPT_SECRET: ${{ secrets.CENTRI_APPS_SCRIPT_SECRET }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.max_calls }}" ]; then
            ARGS="$ARGS --max-calls ${{ github.event.inputs.max_calls }}"
          fi
          if [ -n "${{ github.event.inputs.city }}" ]; then
            ARGS="$ARGS --city ${{ github.event.inputs.city }}"
          fi
          python execution/scripts/enrich_google_places_centri.py $ARGS
