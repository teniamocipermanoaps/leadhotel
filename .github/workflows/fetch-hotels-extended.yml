name: Fetch Hotels EXTENDED (~93 comuni locali → Google Sheet)

on:
  # Domenica notte (02:30 UTC, ~30 min dopo il main per non saturare Overpass)
  schedule:
    - cron: "30 2 * * 0"

  # Esecuzione manuale dalla UI GitHub Actions
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo simulazione (non scrive nel Sheet)"
        required: false
        default: "false"
      city:
        description: "Limita a una sola città (opzionale, es: Sorrento)"
        required: false
        default: ""

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # extended ha ~93 città + retry/backoff → può richiedere 30-50 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch_overpass (dataset extended)
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
        run: |
          ARGS="--dataset extended"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.city }}" ]; then
            ARGS="$ARGS --city ${{ github.event.inputs.city }}"
          fi
          python execution/scripts/fetch_overpass.py $ARGS
