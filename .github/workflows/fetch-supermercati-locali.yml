name: Fetch Supermercati LOCALI (91 comuni non capoluogo APS → Google Sheet Supermercati)

# Comuni non capoluogo in cui opera APS (Sorrento, Fiuggi, area casertana,
# frazioni veneziane...). Complementare ai 108 capoluoghi di MAIN + EXTENDED.
on:
  # Domenica 06:00 UTC (dopo main 04:00 e extended 05:00)
  schedule:
    - cron: "0 6 * * 0"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo simulazione (non scrive nel Sheet)"
        required: false
        default: "false"
      city:
        description: "Limita a una sola città (opzionale, es: Sorrento)"
        required: false
        default: ""

jobs:
  fetch:
    runs-on: ubuntu-latest
    # 91 città + passata di retry sulle fallite (vedi fetch-supermercati.yml).
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch_overpass_supermercati (dataset locali)
        env:
          SUPER_APPS_SCRIPT_URL: ${{ secrets.SUPER_APPS_SCRIPT_URL }}
          SUPER_APPS_SCRIPT_SECRET: ${{ secrets.SUPER_APPS_SCRIPT_SECRET }}
        run: |
          ARGS="--dataset locali"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.city }}" ]; then
            ARGS="$ARGS --city ${{ github.event.inputs.city }}"
          fi
          python execution/scripts/fetch_overpass_supermercati.py $ARGS
