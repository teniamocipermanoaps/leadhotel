name: Fetch Supermercati EXTENDED (50 capoluoghi Centro-Sud/Isole → Google Sheet Supermercati)

on:
  # Domenica 05:00 UTC (dopo il main supermercati)
  schedule:
    - cron: "0 5 * * 0"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo simulazione (non scrive nel Sheet)"
        required: false
        default: "false"
      city:
        description: "Limita a una sola città (opzionale, es: Sorrento)"
        required: false
        default: ""

jobs:
  fetch:
    runs-on: ubuntu-latest
    # 50 città + passata di retry sulle fallite (vedi fetch-supermercati.yml).
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch_overpass_supermercati (dataset extended)
        env:
          SUPER_APPS_SCRIPT_URL: ${{ secrets.SUPER_APPS_SCRIPT_URL }}
          SUPER_APPS_SCRIPT_SECRET: ${{ secrets.SUPER_APPS_SCRIPT_SECRET }}
        run: |
          ARGS="--dataset extended"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.city }}" ]; then
            ARGS="$ARGS --city ${{ github.event.inputs.city }}"
          fi
          python execution/scripts/fetch_overpass_supermercati.py $ARGS
