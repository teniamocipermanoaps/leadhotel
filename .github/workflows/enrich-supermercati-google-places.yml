name: Enrich Supermercati with Google Places API

# Cron MENSILE — il 3 di ogni mese alle 06:00 UTC
# (dopo enrichment hotel del 1° e centri del 2°, per distribuire le chiamate Google)
on:
  schedule:
    - cron: "0 6 3 * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo simulazione (non scrive nel Sheet)"
        required: false
        default: "false"
      max_calls:
        description: "Max chiamate Google Places in questo run (default 5000)"
        required: false
        default: "5000"
      city:
        description: "Limita a una sola città (opzionale, es: Firenze)"
        required: false
        default: ""
      insegna:
        description: "Limita a una sola insegna (opzionale, es: Conad)"
        required: false
        default: ""

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run enrich_google_places_supermercati
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SUPER_APPS_SCRIPT_URL: ${{ secrets.SUPER_APPS_SCRIPT_URL }}
          SUPER_APPS_SCRIPT_SECRET: ${{ secrets.SUPER_APPS_SCRIPT_SECRET }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.max_calls }}" ]; then
            ARGS="$ARGS --max-calls ${{ github.event.inputs.max_calls }}"
          fi
          if [ -n "${{ github.event.inputs.city }}" ]; then
            ARGS="$ARGS --city ${{ github.event.inputs.city }}"
          fi
          if [ -n "${{ github.event.inputs.insegna }}" ]; then
            ARGS="$ARGS --insegna ${{ github.event.inputs.insegna }}"
          fi
          python execution/scripts/enrich_google_places_supermercati.py $ARGS
